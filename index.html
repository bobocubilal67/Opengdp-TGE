<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGDP Airdrop Simulator</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { color: #58a6ff; margin: 0 0 5px 0; font-size: 24px; text-align: center; }
        p.subtitle { color: #8b949e; font-size: 14px; margin: 0 0 20px 0; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: #8b949e; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
        }
        .roles-container {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .role-option {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: #c9d1d9;
            cursor: pointer;
        }
        .role-option input { margin-right: 8px; accent-color: #58a6ff; cursor: pointer; }
        .slider-container { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; }
        .slider-header { display: flex; justify-content: space-between; font-size: 13px; color: #fff; margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: #58a6ff; cursor: pointer; }
        button {
            width: 100%;
            padding: 14px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background: #2ea043; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            background: #21262d;
            border: 1px solid #30363d;
            display: none;
            font-size: 14px;
        }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #30363d; padding-bottom: 6px; }
        .result-item:last-child { border: none; margin: 0; padding: 0; }
        .success-text { color: #3fb950; font-weight: bold; }
        .footer { margin-top: 30px; font-size: 11px; color: #8b949e; letter-spacing: 0.5px; text-align: center; }
        .footer a { color: #58a6ff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>OpenGDP Airdrop</h1>
    <p class="subtitle">Gelişmiş Dağılım ve Kazanç Simülatörü</p>
    
    <div class="input-group">
        <label>Sahip Olduğunuz Toplam XP</label>
        <input type="number" id="userXp" placeholder="Örn: 2500000" value="250000">
    </div>

    <div class="input-group">
        <label>Discord Rollerinizi Seçin (Çoklu Seçim)</label>
        <div class="roles-container">
            <label class="role-option"><input type="checkbox" name="roles" value="Moderators"> Moderators (+50)</label>
            <label class="role-option"><input type="checkbox" name="roles" value="OG Alpha"> OG Alpha (+40)</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Alpha Squad"> Alpha Squad (+25)</label>
            <label class="role-option"><input type="checkbox" name="roles" value="OG Socials"> OG Socials (+20)</label>
            <label class="role-option"><input type="checkbox" name="roles" value="Reinforcement"> Reinforcement (+15)</label>
        </div>
    </div>

    <div class="input-group">
        <label>Simüle Edilecek FDV Piyasası</label>
        <div class="slider-container">
            <div class="slider-header">
                <span>Hedef FDV:</span>
                <span id="fdvDisplay" style="color: #58a6ff; font-weight:bold;">$1.0B</span>
            </div>
            <input type="range" id="fdvSlider" min="100000000" max="10000000000" step="100000000" value="1000000000">
        </div>
    </div>

    <button onclick="calculateAirdrop()">Airdrop Hesapla</button>

    <div id="resultBox" class="result-box"></div>

    <div class="footer">
        POWERED BY <a href="#">bobocubilal</a> | OpenGDP Ecosystem
    </div>
</div>

<script>
    // Matematiksel Sabitler
    const TOTAL_COMMUNITY_XP = 250000000000; 
    const TOTAL_TOKEN_SUPPLY = 10000000000;  
    const XP_POOL_TOKENS = TOTAL_TOKEN_SUPPLY * 0.12;    // 1.2 Milyar Token
    const ROLE_POOL_TOKENS = TOTAL_TOKEN_SUPPLY * 0.03;  // 300 Milyon Token
    const TOTAL_ROLE_POINTS = 4345; 

    const roleWeights = {
        "Moderators": 50,
        "OG Alpha": 40,
        "Alpha Squad": 25,
        "OG Socials": 20,
        "Reinforcement": 15
    };

    // FDV Slider Ayarı
    const slider = document.getElementById('fdvSlider');
    const display = document.getElementById('fdvDisplay');
    
    slider.oninput = function() {
        let val = parseFloat(this.value);
        if(val >= 1000000000) {
            display.innerHTML = "$" + (val / 1000000000).toFixed(1) + "B";
        } else {
            display.innerHTML = "$" + (val / 1000000).toFixed(0) + "M";
        }
    }

    // Gerçek Zamanlı Matematiksel Hesaplama Fonksiyonu
    function calculateAirdrop() {
        const xpInput = parseFloat(document.getElementById('userXp').value) || 0;
        const fdvValue = parseFloat(slider.value);
        const resultBox = document.getElementById('resultBox');

        // A) XP Hesaplama
        const xpRewardTokens = XP_POOL_TOKENS * (xpInput / TOTAL_COMMUNITY_XP);

        // B) Seçilen Rolleri Hesaplama
        let userTotalRolePoints = 0;
        const checkboxes = document.querySelectorAll('input[name="roles"]:checked');
        checkboxes.forEach((cb) => {
            if (roleWeights[cb.value]) {
                userTotalRolePoints += roleWeights[cb.value];
            }
        });
        const roleRewardTokens = ROLE_POOL_TOKENS * (userTotalRolePoints / TOTAL_ROLE_POINTS);

        // C) Finansal Hesaplamalar
        const totalTokens = xpRewardTokens + roleRewardTokens;
        const estimatedTokenPrice = fdvValue / TOTAL_TOKEN_SUPPLY;
        const totalValueUSD = totalTokens * estimatedTokenPrice;

        // Sonuçları Ekranda Gösterme
        resultBox.style.display = 'block';
        resultBox.innerHTML = `
            <div class="result-item"><span>Hesaplama Durumu:</span><span class="success-text">Başarılı ✅</span></div>
            <div class="result-item"><span>Toplam OpenGDP:</span><span style="color:#fff; font-weight:bold;">${Math.floor(totalTokens).toLocaleString()}</span></div>
            <div class="result-item"><span>Tahmini Token Fiyatı:</span><span style="color:#58a6ff;">$${estimatedTokenPrice.toFixed(4)}</span></div>
            <div class="result-item"><span>Toplam Dolar Değeri:</span><span class="success-text">$${totalValueUSD.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span></div>
            <div style="font-size:11px; color:#8b949e; margin-top:12px; text-align:center; border-top: 1px solid #30363d; padding-top: 8px;">
                XP Ödülü: ${Math.floor(xpRewardTokens).toLocaleString()} | Rol Ödülü: ${Math.floor(roleRewardTokens).toLocaleString()}
            </div>
        `;
    }
</script>

</body>
</html>
